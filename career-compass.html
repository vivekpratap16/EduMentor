<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Compass</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        .career-list {
            list-style: none;
            padding: 0;
        }
        .career-item {
            background: #e9e9e9;
            margin: 10px 0;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        .career-item:hover {
            background: #d9d9d9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Career Compass</h1>
        <p>Select a career to explore universities:</p>
        <ul class="career-list" id="careerList">
            <!-- Careers will be populated here -->
        </ul>
    </div>

    <script>
        // Sample careers database (replace with actual data)
        const careersDB = [
            { title: 'Software Engineer', sector: 'tech', edu: 'degree' },
            { title: 'Doctor', sector: 'medical', edu: 'advanced' },
            { title: 'Business Analyst', sector: 'business', edu: 'degree' },
            { title: 'Graphic Designer', sector: 'creative', edu: 'diploma' },
            { title: 'Lawyer', sector: 'law', edu: 'advanced' }
            // Add more careers as needed
        ];

        let currentSelectedTitle = null;

        // Function to populate career list
        function populateCareers() {
            const careerList = document.getElementById('careerList');
            careersDB.forEach(career => {
                const li = document.createElement('li');
                li.className = 'career-item';
                li.textContent = career.title;
                li.onclick = () => selectCareer(career.title);
                careerList.appendChild(li);
            });
        }

        // Function to select a career
        function selectCareer(title) {
            currentSelectedTitle = title;
            redirectToUniversities();
        }

        // Function to redirect to universities page
        function redirectToUniversities() {
            let targetUrl = 'edtech-universities.html';

            if (currentSelectedTitle) {
                // Find career data
                const data = careersDB.find(c => c.title === currentSelectedTitle);

                if (!data) {
                    alert('Career data not found!');
                    return;
                }

                // Map career sector to university stream
                const streamMap = {
                    'tech': 'Engineering',
                    'medical': 'Medical',
                    'business': 'Management',
                    'creative': 'Design',
                    'law': 'Law'
                };
                const mappedStream = streamMap[data.sector] || '';

                // Map career education to university level
                const levelMap = {
                    'degree': 'UG',
                    'advanced': 'PG',
                    'diploma': 'Diploma'
                };
                const mappedLevel = levelMap[data.edu] || '';

                // Build URL with parameters
                const params = new URLSearchParams();
                params.append('career', currentSelectedTitle);
                if (mappedStream) params.append('stream', mappedStream);
                if (mappedLevel) params.append('level', mappedLevel);

                targetUrl += '?' + params.toString();
            }

            // Redirect using window.location for simplicity
            window.location.href = targetUrl;
        }

        // Initialize the page
        document.addEventListener('DOMContentLoaded', populateCareers);
    </script>
</body>
</html>
